    function renderMetrics(){const m=[["3","Show Days"],["2","Rehearsal Days"],["5","Onsite Days"]];$("metrics").innerHTML=m.map(x=>`<div class="metric"><b>${x[0]}</b><span>${x[1]}</span></div>`).join("");}
    function heatPanel(){const max=Math.max(...Object.values(DATA.dayLoad).map(d=>d.total),1);return `<aside class="panel heat"><h3>Hot Days</h3>${DATA.dates.map(d=>`<div class="heat-row"><span>${d.replace(" (","<br>(")}</span><div class="track"><div class="fill" style="width:${DATA.dayLoad[d].total/max*100}%"></div></div><b>${DATA.dayLoad[d].total}</b></div>`).join("")}</aside>`;}
    function callPanel(){const calls=[["23 May","10:00","Paulaner onsite"],["24 May","09:00","Paulaner rehearsal day"],["25 May","06:30","Business Session / Dallmayr"],["26 May","09:00","Gala rehearsal"],["27 May","09:00","Gala Dinner"]];return `<aside class="panel"><h3>Call Time</h3><div class="call-list">${calls.map(c=>`<div class="call-item"><b>${c[1]}</b><span>${c[0]} · ${c[2]}</span></div>`).join("")}</div></aside>`;}
    function renderMaster(){const rows=DATA.master.filter(contains).filter(dateOK);$("master").innerHTML=head("Master Flow")+filters()+`<div class="split"><div class="timeline">${rows.map(r=>`<article class="master-row"><div class="type">${r["Master Show Dates"]}</div><div class="date">${r["日期 (Date)"]}</div><div><div class="title">${r["场次/任务 (Event)"]}</div><div class="body">${r["场务及时间窗备注 (Ops / Time Notes)"]}</div></div><div class="body">${r["团队 (Crew)"]}</div></article>`).join("")||empty()}</div>${heatPanel()}</div>`;bindFilters($("master"));}
    function flowRows(rows,type){return `<div class="flow-table">${rows.map(r=>`<div class="flow-row"><div class="date">${r["日期 (Date)"]||"Section"}</div><div class="date">${r["时间 (Time)"]||"—"}</div><div class="cat">${r["分类 (Category)"]||r["批次 (Wave/Phase)"]||type}</div><div><div class="activity">${r["任务/里程碑 (Activity/Milestone)"]||r["任务/环节 (Rehearsal Activity)"]||r["批次 (Wave/Phase)"]}</div><div class="small">${r["备注 (Notes)"]||r["备注 (Notes & AC Control)"]||""}</div></div><div class="small">${r["涉及团队 (Crew/Target)"]||r["团队 (Crew)"]||""}</div></div>`).join("")||empty()}</div>`;}
    function renderSetup(){const rows=DATA.setup.filter(contains).filter(dateOK);$("setup").innerHTML=head("Setup / Pre-show")+filters()+`<div class="split">${flowRows(rows,"Setup")}${callPanel()}</div>`;bindFilters($("setup"));}
    function renderRehearsal(){const rows=DATA.rehearsal.filter(contains).filter(dateOK);$("rehearsal").innerHTML=head("Rehearsal Schedule")+filters()+`<div class="split">${flowRows(rows,"Rehearsal")}${heatPanel()}</div>`;bindFilters($("rehearsal"));}
    function importantRun(r){return /启幕|祝酒|开桶|After Dark|Gala|主席|keynote|opening|toast|beer/i.test(Object.values(r).join(" "));}
    function runKeyPanel(){const items=[
      ["Business Session","09:30","Opening video"],
      ["Business Session","11:45","Beer barrel opening / toast"],
      ["Dallmayr","18:30","SVA arrival"],
      ["Dallmayr","18:45","Welcome speech"],
      ["Gala Dinner","18:00","Guest arrival / cocktail"],
      ["Gala Dinner","19:00","Opening show"],
      ["Gala Dinner","19:30","Dinner service starts"],
      ["Gala Dinner","20:30","Main show"]
    ];return `<aside class="panel"><h3>Key Timing</h3><div class="side-list">${items.map(i=>`<div class="side-hit"><b>${i[0]} · ${i[1]}</b>${i[2]}</div>`).join("")}</div></aside>`;}
    function renderRundown(){const streams=["Biz","Dallmayr","Gala"];const rows=DATA.rundown.filter(contains);$("rundown").innerHTML=head("Run of Show")+`<div class="split"><div class="stream-board">${streams.map(s=>{const rs=rows.filter(r=>r["模块 (Stream)"]===s);return `<div class="stream-col"><div class="stream-head"><b>${s}</b><span>${rs[0]?.["Stream Date"]||""}</span></div>${rs.map(r=>`<div class="run-item"><div class="run-time">${r["时间 (Time)"]||"Section"}</div><div class="run-title">${r["事项/环节 (Run of Show)"]}</div><div class="run-note">${r["备注 (Notes)"]||r["涉及团队 (Crew/Target)"]||""}</div></div>`).join("")}</div>`}).join("")}</div>${runKeyPanel()}</div>`;}
    function cueFeature(r){return `<div class="cue-feature"><div class="feature-badge">${r["DSM Preset"]||"DSM"}<br>${r["E2 Preset"]||""}</div><div class="feature-title">${r["Program Content"]||"Select cue"}</div><div class="feature-meta"><div class="feature-cell"><b>Time</b>${r.Time||"#"+(r["1"]||"")}</div><div class="feature-cell"><b>Standby</b>${r.Standby||"Show caller watch"}</div><div class="feature-cell"><b>Audio</b>${r.Audio||"—"}</div><div class="feature-cell"><b>Screen</b>${r["Ultra wide\n  Main Screen"]||"—"} / ${r["Delay Screen"]||"—"}</div></div></div>`;}
    function renderCue(){const rows=DATA.cue.filter(contains);const selected=rows[state.cue]||rows[0]||{};$("cue").innerHTML=head("Cue Script")+`<div class="cue-shell"><div class="cue-list">${rows.map((r,i)=>`<article class="cue-line ${r.Importance}" data-i="${i}"><div class="cue-time">${r.Time||"#"+r["1"]}</div><div><div class="cue-program">${r["Program Content"]}</div><div class="cue-tech">${r.Standby}</div></div><div class="cue-tech"><b>Audio</b><br>${r.Audio||"—"}</div><div class="cue-tech"><b>Screen</b><br>${r["Ultra wide\n  Main Screen"]||"—"} / ${r["Delay Screen"]||"—"}</div><div class="cue-chip">${r["DSM Preset"]||"DSM"}</div></article>`).join("")||empty()}</div>${cueFeature(selected)}</div>`;$("cue").querySelectorAll(".cue-line").forEach(el=>el.onclick=()=>{state.cue=Number(el.dataset.i);renderCue();});}
    function presetCard(name,sub,blocks){return `<div class="preset-card"><div class="preset-title">${name}</div><div class="preset-sub">${sub}</div><div class="preset-visual">${blocks}</div></div>`}
    function pipCanvas(type, mode="two"){const cls=type==="video"?"video":"ppt";const label=type==="video"?"16:9 VIDEO":type==="camera"?"16:9 CAMERA":"16:9 PPT";const windows=mode==="center"?`<div class="screen-window center ${cls}">${label}</div>`:`<div class="screen-window left ${cls}">${label}</div><div class="screen-window right ${cls}">${label}</div>`;return `<div class="screen-canvas">${windows}</div>`;}
    function dsmPreset2(){return `<div class="dsm-mini-grid"><div class="dsm-mini ppt"><span>DSM 1<br>PPT</span><span class="timer-bug">Timer</span></div><div class="dsm-mini notes"><span>DSM 2<br>Notes</span><span class="timer-bug">Timer</span></div><div class="dsm-mini notes"><span>DSM 3<br>Notes</span><span class="timer-bug">Timer</span></div><div class="dsm-mini ppt"><span>DSM 4<br>PPT</span><span class="timer-bug">Timer</span></div></div>`;}
    function renderScreen(){ $("screen").innerHTML=head("Screen Preset")+`<div class="screen-section"><div class="screen-layout"><h3>Physical Layout</h3><div class="stage-map"><div class="screen-box">Delay Screen L<br>16:9</div><div><div class="screen-box main-led">MAIN LED<br>18.5m x 4.5m<br>KV / PPT / VT / Livefeed</div><div class="dsm-grid"><div class="screen-box">DSM 1</div><div class="screen-box">DSM 2</div><div class="screen-box">DSM 3</div><div class="screen-box">DSM 4</div></div><div class="screen-box prompter" style="margin-top:14px">Large Notes Prompter<br>Speaker notes / MC script / moderator questions</div></div><div class="screen-box">Delay Screen R<br>16:9</div></div></div><div class="preset-grid">${presetCard("Preset 1","Walk-in / holding / MC reset",'<div class="block kv">KV / HOLDING</div>')}${presetCard("Preset 2","Speaker PPT full screen",'<div class="block ppt">PPT<br>FULL SCREEN</div>')}${presetCard("Preset 3","Walk-up / bumper",'<div class="visual-row"><div class="block video">VT BUMPER</div><div class="block kv">LIVEFEED DELAY</div></div>')}${presetCard("Preset 5","Panel livefeed / camera PIP",pipCanvas("camera"))}${presetCard("Preset 6","VIP / barrel / toast",pipCanvas("ppt"))}${presetCard("Preset 7","Dance / video PIP",pipCanvas("video"))}</div><div class="preset-grid">${presetCard("DSM 1","KV clean layout",'<div class="visual-row"><div class="block kv">KV</div><div class="block kv">KV</div></div><div class="visual-row"><div class="block kv">KV</div><div class="block kv">KV</div></div>')}${presetCard("DSM 2","PPT / Notes with timer bug",dsmPreset2())}${presetCard("DSM 3","Video confidence",'<div class="visual-row"><div class="block video">Video</div><div class="block video">Video</div></div><div class="visual-row"><div class="block video">Video</div><div class="block video">Video</div></div>')}</div></div>`;}
    function renderActive(){({master:renderMaster,setup:renderSetup,rehearsal:renderRehearsal,rundown:renderRundown,cue:renderCue,screen:renderScreen}[state.tab])();}
    function init(){renderMetrics();renderTabs();renderMaster();renderSetup();renderRehearsal();renderRundown();renderCue();renderScreen();$("search").oninput=e=>{state.q=e.target.value;renderActive();};}
    init();
  </script>
</body>
</html>
